<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skakalni Scoreboard</title>
    <style>
        /* Osnovne nastavitve za celoten ekran */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden; /* TV grafike navadno ne drsijo */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigacija na vrhu */
        #nav-bar {
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            position: relative;
            z-index: 100;
            transition: top 0.5s;
        }
        
        #nav-bar.hidden {
            top: -100px;
            position: absolute;
            width: 100%;
        }

        button {
            background: linear-gradient(180deg, #333, #111);
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        button:hover {
            background: linear-gradient(180deg, #0056b3, #003d82);
            border-color: #007bff;
        }

        .btn-admin {
            position: absolute;
            right: 20px;
            background: linear-gradient(180deg, #8b0000, #5a0000);
        }

        .btn-admin:hover {
            background: linear-gradient(180deg, #b30000, #800000);
        }

        /* Pogledi (Views) */
        .view {
            display: none;
            flex-grow: 1;
            padding: 20px;
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .view.active {
            display: block;
        }

        /* ADMIN pogled */
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            background: #222;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        .admin-form input {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 4px;
            background: #333;
            color: white;
        }
        .admin-list {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }
        .admin-list th, .admin-list td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #444;
        }

        /* TABELA pogled */
        .table-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        .results-table th {
            background: #003d82;
            padding: 15px;
            text-align: left;
            font-size: 18px;
        }
        .results-table td {
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .results-table tr:nth-child(even) {
            background: #1a1a1a;
        }
        .medal {
            font-size: 24px;
            margin-right: 10px;
        }
        .color-gold { color: #ffd700; }
        .color-silver { color: #c0c0c0; }
        .color-bronze { color: #cd7f32; }

        /* PROJEKCIJA pogled */
        .competitor-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 50px;
        }
        .comp-btn {
            font-size: 20px;
            padding: 15px 30px;
            background: #333;
        }
        .comp-btn:hover { background: #007bff; }

        /* TV Grafika znotraj projekcije */
        #tv-graphics {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Da kliki grejo skozi za aktivacijo animacij */
        }
        
        /* Ovojnica za sprejem klikov na celotnem ekranu */
        #reveal-click-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            cursor: pointer;
            pointer-events: auto;
        }

        /* Tabela najboljših 5 (Spodaj levo) */
        .top5-table {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 350px;
            background: rgba(0, 0, 0, 0.85);
            border-top: 4px solid #007bff;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 60;
        }
        .top5-title {
            background: #003d82;
            padding: 10px;
            font-weight: bold;
            text-align: center;
        }
        .top5-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            border-bottom: 1px solid #333;
        }
        .top5-row.leader {
            background: linear-gradient(90deg, #4b3e00, transparent);
            color: #ffd700;
        }

        /* Glavna pasica za tekmovalca (Spodaj desno) */
        .reveal-banner {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 700px;
            background: rgba(0, 0, 0, 0.9);
            border-left: 6px solid #007bff;
            display: flex;
            align-items: center;
            padding: 15px 25px;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 60;
        }
        .rb-name {
            font-size: 28px;
            font-weight: bold;
            flex-grow: 1;
            text-transform: uppercase;
        }
        .rb-scores {
            display: flex;
            gap: 15px;
            font-size: 24px;
            color: #aaa;
        }
        .rb-total {
            font-size: 32px;
            font-weight: 900;
            color: #ffd700;
            margin-left: 20px;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
        .rb-rank {
            background: white;
            color: black;
            font-size: 32px;
            font-weight: 900;
            padding: 5px 20px;
            margin-left: 20px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .rb-rank.show {
            opacity: 1;
            transform: translateX(0);
        }

        /* Moder graf (Ski jumping virtual line) */
        .graph-container {
            position: absolute;
            bottom: 140px;
            right: 150px;
            width: 80px;
            height: 300px;
            background: rgba(0, 0, 0, 0.6);
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            display: none;
            z-index: 60;
        }
        .graph-target-line {
            position: absolute;
            width: 120%;
            left: -10%;
            border-top: 3px dashed #00ff00;
            z-index: 2;
        }
        .graph-target-label {
            position: absolute;
            right: -60px;
            top: -10px;
            color: #00ff00;
            font-weight: bold;
            font-size: 18px;
        }
        .graph-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #003d82, #007bff);
            height: 0%;
            transition: height 2s ease-out;
            z-index: 1;
        }

        #btn-continue-reveal {
            position: absolute;
            bottom: 120px;
            right: 40px;
            display: none;
            z-index: 70;
            background: #28a745;
        }
        
        #btn-podium-trigger {
            position: absolute;
            bottom: 120px;
            right: 40px;
            display: none;
            z-index: 70;
            background: #ffc107;
            color: black;
            font-size: 20px;
        }

        /* STOPNIČKE (Podium) animacija */
        #podium-view {
            background: radial-gradient(circle, #1a2a6c, #112942, #000000);
            display: none; /* flex overriden when active */
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 100px;
        }
        #podium-view.active {
            display: flex;
        }
        .podium-title {
            position: absolute;
            top: 50px;
            font-size: 48px;
            font-weight: bold;
            text-transform: uppercase;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            animation: fadeInDown 1s ease;
        }
        .podium-stands {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            height: 400px;
        }
        .step {
            width: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: black;
            position: relative;
            transform: translateY(100vh); /* Start off-screen bottom */
        }
        .step-name {
            position: absolute;
            top: -60px;
            color: white;
            text-align: center;
            width: 200px;
            font-size: 22px;
            text-shadow: 2px 2px 4px #000;
            opacity: 0;
            transition: opacity 1s;
        }
        .step.rank-1 { background: linear-gradient(180deg, #ffd700, #b8860b); height: 100%; z-index: 3; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 1s; }
        .step.rank-2 { background: linear-gradient(180deg, #e0e0e0, #808080); height: 75%; z-index: 2; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s; }
        .step.rank-3 { background: linear-gradient(180deg, #cd7f32, #8b4513); height: 50%; z-index: 1; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0s; }
        
        .step.animate-up { transform: translateY(0); }
        .step.animate-up .step-name { opacity: 1; transition-delay: 2s; }

        .step-number { font-size: 60px; opacity: 0.3; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pomožni razredi */
        .bold-score { font-weight: 900; color: white; }
    </style>
</head>
<body>

    <!-- NAVIGACIJA -->
    <div id="nav-bar">
        <button onclick="switchView('table')">TABELA</button>
        <button onclick="switchView('projection')">Projekcija</button>
        <button class="btn-admin" onclick="switchView('admin')">ADMIN</button>
    </div>

    <!-- POGLED 1: TABELA -->
    <div id="table-view" class="view">
        <div class="table-container">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Mesto</th>
                        <th>Tekmovalec</th>
                        <th>Točke</th>
                    </tr>
                </thead>
                <tbody id="full-table-body">
                    <!-- Dinamično generirano -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- POGLED 2: PROJEKCIJA -->
    <div id="projection-view" class="view">
        
        <!-- Začetni seznam preostalih tekmovalcev -->
        <div id="projection-start-screen">
            <h2 style="text-align:center; font-size: 32px;">Pripravljeni tekmovalci</h2>
            <div class="competitor-list" id="unrevealed-list">
                <!-- Gumbi -->
            </div>
            <div style="text-align:center; margin-top:50px;">
                <button id="btn-podium-trigger" onclick="startPodiumAnimation()">Podeli stopničke 🏆</button>
            </div>
        </div>

        <!-- TV Grafike (aktivne ob kliku na tekmovalca) -->
        <div id="tv-graphics">
            <!-- Gumb za nadaljevanje, ko je cikel zaključen -->
            <button id="btn-continue-reveal" onclick="finishRevealCycle()">Nadaljuj</button>

            <!-- Spodaj levo TOP 5 -->
            <div class="top5-table">
                <div class="top5-title">TRENUTNO VODILNI (TOP 5)</div>
                <div id="top5-body">
                    <!-- Dinamično -->
                </div>
            </div>

            <!-- Moder Graf (pojavi se po potrebi) -->
            <div class="graph-container" id="reveal-graph">
                <div class="graph-target-line" id="graph-line">
                    <div class="graph-target-label" id="graph-label">Meja</div>
                </div>
                <div class="graph-bar" id="graph-bar"></div>
            </div>

            <!-- Spodaj desno Glavna vrstica -->
            <div class="reveal-banner">
                <div class="rb-name" id="rb-name">Ime Priimek</div>
                <div class="rb-scores" id="rb-scores">
                    <!-- Pretekle serije -->
                </div>
                <div class="rb-total" id="rb-total">
                    <!-- Zadnja serija + seštevek -->
                </div>
                <div class="rb-rank" id="rb-rank">1</div>
            </div>

            <!-- Preko celega ekrana za zaznavo klika za začetek rasti grafa -->
            <div id="reveal-click-area" onclick="triggerRevealStep()"></div>
        </div>
    </div>

    <!-- POGLED 3: ADMIN -->
    <div id="admin-view" class="view active">
        <div class="admin-container">
            <h2>Vnos rezultatov</h2>
            <div class="admin-form">
                <label>Ime tekmovalca:</label>
                <input type="text" id="admin-name" placeholder="Npr. Peter Prevc">
                
                <label>Rezultati serij (ločeni z vejico):</label>
                <input type="text" id="admin-scores" placeholder="Npr. 125.5, 133.0">
                
                <button onclick="addCompetitor()">Dodaj tekmovalca</button>
            </div>

            <table class="admin-list">
                <thead>
                    <tr>
                        <th>Tekmovalec</th>
                        <th>Serije</th>
                        <th>Skupaj</th>
                        <th>Akcija</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                </tbody>
            </table>
            
            <br>
            <button onclick="resetSystem()" style="background:#dc3545; font-size:12px;">Resetiraj vse</button>
        </div>
    </div>

    <!-- POGLED 4: STOPNIČKE -->
    <div id="podium-view" class="view">
        <div class="podium-title">Končni Rezultati</div>
        <div class="podium-stands">
            <div class="step rank-2" id="podium-step-2">
                <div class="step-name" id="podium-name-2">Ime Priimek<br><small>Točke</small></div>
                <div class="step-number">2</div>
            </div>
            <div class="step rank-1" id="podium-step-1">
                <div class="step-name" id="podium-name-1">Ime Priimek<br><small>Točke</small></div>
                <div class="step-number">1</div>
            </div>
            <div class="step rank-3" id="podium-step-3">
                <div class="step-name" id="podium-name-3">Ime Priimek<br><small>Točke</small></div>
                <div class="step-number">3</div>
            </div>
        </div>
        <button style="position: absolute; top: 20px; left: 20px; z-index: 100;" onclick="switchView('table')">Nazaj na tabelo</button>
    </div>

    <script>
        // GLOBALI IN STANJE APLIKACIJE
        let competitors = [];
        let revealedIds = []; 
        let activeId = null; 
        let revealPhase = 0; // 0: initial, 1: graph growing/waiting, 2: done waiting
        let graphTimeout = null;

        // --- ADMIN LOGIKA ---
        function addCompetitor() {
            const nameEl = document.getElementById('admin-name');
            const scoresEl = document.getElementById('admin-scores');
            
            const name = nameEl.value.trim();
            const scoresStr = scoresEl.value.trim();

            if (!name || !scoresStr) {
                alert("Prosim vpišite ime in rezultate.");
                return;
            }

            const scores = scoresStr.split(',').map(s => parseFloat(s.trim())).filter(s => !isNaN(s));
            if (scores.length === 0) {
                alert("Napačen format rezultatov.");
                return;
            }

            const total = scores.reduce((sum, val) => sum + val, 0);

            competitors.push({
                id: Date.now().toString(),
                name: name,
                scores: scores,
                total: total
            });

            nameEl.value = '';
            scoresEl.value = '';
            
            updateAdminTable();
        }

        function removeCompetitor(id) {
            competitors = competitors.filter(c => c.id !== id);
            revealedIds = revealedIds.filter(rid => rid !== id);
            updateAdminTable();
        }

        function updateAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            competitors.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.name}</td>
                    <td>${c.scores.join(' / ')}</td>
                    <td><b>${c.total.toFixed(1)}</b></td>
                    <td><button onclick="removeCompetitor('${c.id}')" style="padding: 5px; font-size: 12px; background:#dc3545;">Odstrani</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resetSystem() {
            if(confirm("Ste prepričani, da želite izbrisati vse podatke?")) {
                competitors = [];
                revealedIds = [];
                updateAdminTable();
            }
        }

        // --- POGLED TABELA ---
        function generateFullTable() {
            const tbody = document.getElementById('full-table-body');
            tbody.innerHTML = '';
            
            // Pokaži samo razkrite v tekmovanju, če gremo "live", ali pa kar vse, če želimo.
            // Za scoreboard na televiziji med samo tekmo, tabela kaže trenutno razkrite
            const visibleCompetitors = competitors.filter(c => revealedIds.includes(c.id))
                                                  .sort((a,b) => b.total - a.total);

            visibleCompetitors.forEach((c, index) => {
                const tr = document.createElement('tr');
                let rankStr = `${index + 1}.`;
                let medalClass = '';
                
                if (index === 0) { rankStr = `<span class="medal color-gold">🥇</span> 1.`; }
                else if (index === 1) { rankStr = `<span class="medal color-silver">🥈</span> 2.`; }
                else if (index === 2) { rankStr = `<span class="medal color-bronze">🥉</span> 3.`; }

                tr.innerHTML = `
                    <td>${rankStr}</td>
                    <td>${c.name}</td>
                    <td>${c.total.toFixed(1)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- PROJEKCIJA LOGIKA ---
        function renderProjectionStartScreen() {
            const listDiv = document.getElementById('unrevealed-list');
            listDiv.innerHTML = '';
            
            const unrevealed = competitors.filter(c => !revealedIds.includes(c.id));
            
            unrevealed.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'comp-btn';
                btn.textContent = c.name;
                btn.onclick = () => startReveal(c.id);
                listDiv.appendChild(btn);
            });

            // Gumb podeli stopničke
            const podiumBtn = document.getElementById('btn-podium-trigger');
            if (unrevealed.length === 0 && competitors.length >= 3) {
                podiumBtn.style.display = 'inline-block';
            } else {
                podiumBtn.style.display = 'none';
            }
        }

        function getLeaderTotal() {
            const revealed = competitors.filter(c => revealedIds.includes(c.id));
            if (revealed.length === 0) return 0;
            return Math.max(...revealed.map(c => c.total));
        }

        function startReveal(id) {
            activeId = id;
            revealPhase = 0;
            const comp = competitors.find(c => c.id === id);
            const leaderTotal = getLeaderTotal();
            
            // Skrij nav bar in začetni zaslon
            document.getElementById('nav-bar').classList.add('hidden');
            document.getElementById('projection-start-screen').style.display = 'none';
            document.getElementById('tv-graphics').style.display = 'block';
            
            // Reset grafičnih elementov
            document.getElementById('rb-total').style.opacity = '0';
            document.getElementById('rb-rank').classList.remove('show');
            document.getElementById('btn-continue-reveal').style.display = 'none';
            document.getElementById('reveal-graph').style.display = 'none';
            document.getElementById('graph-bar').style.height = '0%';
            document.getElementById('graph-bar').style.transition = 'none'; // reset transition

            // Nastavi Top 5
            renderTop5();

            // Nastavi Banner tekmovalca
            document.getElementById('rb-name').textContent = comp.name;
            
            const scoresHtml = comp.scores.slice(0, -1).map(s => `<span>${s.toFixed(1)}</span>`).join(' | ');
            document.getElementById('rb-scores').innerHTML = scoresHtml;

            // Preveri če rabimo graf (če je oddaljen manj kot 13 točk ali pa prehiteva vodilnega)
            // in seveda, če vodilni sploh obstaja
            let gap = leaderTotal - comp.total;
            let needsGraph = (leaderTotal > 0) && (gap <= 13 || comp.total > leaderTotal);

            if (needsGraph) {
                setupGraph(leaderTotal, comp.total);
            }

            // Ovojnica čaka na klik (zato da uporabnik - operater sam sproži graf)
            // Stanje preide na čakanje prvega klika
            document.getElementById('reveal-click-area').style.display = 'block';
        }

        function setupGraph(leaderTotal, compTotal) {
            document.getElementById('reveal-graph').style.display = 'block';
            
            // Matematika za graf
            // Najvišja vrednost bo malenkost večja od večje izmed obeh vrednosti
            const maxVal = Math.max(leaderTotal, compTotal) + 15;
            
            // Linija (meja za vodstvo)
            const linePct = (leaderTotal / maxVal) * 100;
            document.getElementById('graph-line').style.bottom = `${linePct}%`;
            document.getElementById('graph-label').textContent = leaderTotal.toFixed(1);

            // Shranimo ciljno višino bara v atribut
            const barPct = (compTotal / maxVal) * 100;
            document.getElementById('graph-bar').setAttribute('data-target-height', `${barPct}%`);
        }

        // Ta funkcija se zgodi ob kliku kjerkoli na ekran v času projekcije
        function triggerRevealStep() {
            if (revealPhase === 0) {
                // Faza 0 -> 1: Začnemo animacijo grafa (ali pa takoj pokažemo rezultat, če grafa ni)
                revealPhase = 1;
                
                const graphContainer = document.getElementById('reveal-graph');
                if (graphContainer.style.display === 'block') {
                    // Animacija rasti grafa
                    const bar = document.getElementById('graph-bar');
                    // enable transition again
                    setTimeout(() => {
                        bar.style.transition = 'height 2s ease-out';
                        bar.style.height = bar.getAttribute('data-target-height');
                    }, 50);

                    // Po 5 sekundah od trenutka klika (rast traja 2s, nato še 3s čakanja) graf izgine in prikaže se točke
                    graphTimeout = setTimeout(() => {
                        finishRevealAnimation();
                    }, 5000);
                } else {
                    // Ni grafa, samo prikažemo točke takoj
                    finishRevealAnimation();
                }
            }
        }

        function finishRevealAnimation() {
            revealPhase = 2; // Faza končana
            document.getElementById('reveal-click-area').style.display = 'none'; // Preprečimo nadaljnje klike
            document.getElementById('reveal-graph').style.display = 'none';
            
            const comp = competitors.find(c => c.id === activeId);
            
            // Sestavimo zadnjo oceno krepko in seštevek
            const lastScore = comp.scores[comp.scores.length - 1];
            let totalHtml = `<span class="bold-score">${lastScore.toFixed(1)}</span> / ${comp.total.toFixed(1)}`;
            if(comp.scores.length === 1) {
                totalHtml = `<span class="bold-score">${comp.total.toFixed(1)}</span>`;
            }
            
            const rbTotal = document.getElementById('rb-total');
            rbTotal.innerHTML = totalHtml;
            rbTotal.style.opacity = '1';

            // Določimo mesto (z začasnim dodajanjem v revealed listo)
            const tempRevealed = [...revealedIds, activeId];
            const sorted = competitors.filter(c => tempRevealed.includes(c.id)).sort((a,b) => b.total - a.total);
            const rank = sorted.findIndex(c => c.id === activeId) + 1;

            const rankEl = document.getElementById('rb-rank');
            rankEl.textContent = rank;
            rankEl.classList.add('show');

            // Posodobimo Top 5 takoj po razkritju
            revealedIds.push(activeId);
            renderTop5();

            // Pokaži gumb za nadaljevanje na seznam
            setTimeout(() => {
                document.getElementById('btn-continue-reveal').style.display = 'block';
            }, 1000);
        }

        function finishRevealCycle() {
            // Nazaj na start screen
            document.getElementById('tv-graphics').style.display = 'none';
            document.getElementById('projection-start-screen').style.display = 'block';
            document.getElementById('nav-bar').classList.remove('hidden');
            renderProjectionStartScreen();
        }

        function renderTop5() {
            const tbody = document.getElementById('top5-body');
            tbody.innerHTML = '';
            
            const visibleCompetitors = competitors.filter(c => revealedIds.includes(c.id))
                                                  .sort((a,b) => b.total - a.total)
                                                  .slice(0, 5); // Samo top 5

            visibleCompetitors.forEach((c, index) => {
                const div = document.createElement('div');
                div.className = 'top5-row' + (index === 0 ? ' leader' : '');
                div.innerHTML = `
                    <span><b>${index + 1}.</b> ${c.name}</span>
                    <span><b>${c.total.toFixed(1)}</b></span>
                `;
                tbody.appendChild(div);
            });
        }

        // --- STOPNIČKE LOGIKA ---
        function startPodiumAnimation() {
            switchView('podium');
            document.getElementById('nav-bar').classList.add('hidden'); // Skrij nav
            
            const top3 = competitors.sort((a,b) => b.total - a.total).slice(0, 3);
            
            // Reset razreda
            document.querySelectorAll('.step').forEach(s => s.classList.remove('animate-up'));

            // Nastavi podatke
            if(top3[0]) document.getElementById('podium-name-1').innerHTML = `${top3[0].name}<br><small>${top3[0].total.toFixed(1)}</small>`;
            if(top3[1]) document.getElementById('podium-name-2').innerHTML = `${top3[1].name}<br><small>${top3[1].total.toFixed(1)}</small>`;
            if(top3[2]) document.getElementById('podium-name-3').innerHTML = `${top3[2].name}<br><small>${top3[2].total.toFixed(1)}</small>`;

            // Zagon animacije malce za tem ko se okno pokaže
            setTimeout(() => {
                document.querySelectorAll('.step').forEach(s => s.classList.add('animate-up'));
            }, 100);
        }

        // --- GLAVNI NAVIGATOR ---
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            if (viewName === 'admin') {
                document.getElementById('admin-view').classList.add('active');
                document.getElementById('nav-bar').classList.remove('hidden');
                updateAdminTable();
            } else if (viewName === 'table') {
                document.getElementById('table-view').classList.add('active');
                document.getElementById('nav-bar').classList.remove('hidden');
                generateFullTable();
            } else if (viewName === 'projection') {
                document.getElementById('projection-view').classList.add('active');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('projection-start-screen').style.display = 'block';
                document.getElementById('tv-graphics').style.display = 'none';
                renderProjectionStartScreen();
            } else if (viewName === 'podium') {
                document.getElementById('podium-view').classList.add('active');
            }
        }

    </script>
</body>
</html>
